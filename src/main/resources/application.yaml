spring:
  config:
    import: optional:file:.env[.properties],optional:file:./application-local.yaml,optional:classpath:application-local.yaml

  application:
    name: e-learning

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB


  datasource:
    url: jdbc:mysql://localhost:3306/e-learning?useSSL=false&serverTimezone=UTC&zeroDateTimeBehavior=convertToNull
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  mail:
    host: sandbox.smtp.mailtrap.io
    port: 465
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    env:
      enabled: true

info:
  app:
    name: Student Management System
    version: 1.0.0

upload:
  path: uploads/



